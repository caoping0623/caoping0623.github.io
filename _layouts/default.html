<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>document.addEventListener("DOMContentLoaded",function(){mermaid.initialize({startOnLoad:true,theme:"base",themeVariables:{primaryColor:"#c8b8e4",primaryTextColor:"#3d3556",primaryBorderColor:"#b49bc8",lineColor:"#a0888c",secondaryColor:"#b8dcd8",tertiaryColor:"#f8e8c8",edgeLabelBackground:"#faf7f2",clusterBkg:"#f4f0fb",clusterBorder:"#d0bce0",titleColor:"#3d3556",nodeBorder:"#b49bc8",mainBkg:"#f0eaf8",fontFamily:"Inter,'PingFang SC','Microsoft YaHei',sans-serif"}});function shrinkArrows(){document.querySelectorAll('.mermaid marker:not([data-scaled])').forEach(function(m){['markerWidth','markerHeight'].forEach(function(a){var v=parseFloat(m.getAttribute(a));if(v>0)m.setAttribute(a,(v*0.5).toFixed(1));});m.setAttribute('data-scaled','1');});}var mo=new MutationObserver(shrinkArrows);document.querySelectorAll('.mermaid').forEach(function(el){mo.observe(el,{childList:true,subtree:true});});});</script>
</head>
<body>
<div class="site-wrapper">

  <header class="site-header">
    <div class="container">
      <nav class="nav-inner">
        <a href="{{ '/' | relative_url }}" class="site-logo">⚡ {{ site.title }}</a>
        <ul class="nav-links">
          {% for item in site.nav %}
          <li><a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
      <p>© {{ 'now' | date: "%Y" }} {{ site.author.name }} · 用代码构建美好世界</p>
    </div>
  </footer>

</div>
</body>
</html>
